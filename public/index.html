<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Crear Cita Real</h3>
    <textarea id="text" placeholder="Escribe tu cita aquí..."></textarea>
    <button onclick="sendQuote()">Enviar a la conversación</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abre la app a pantalla completa

        async function sendQuote() {
            const text = document.getElementById('text').value;
            const chat_id = tg.initDataUnsafe.chat?.id || tg.initDataUnsafe.user.id;

            // Llamamos a nuestro backend de Vercel
            await fetch('/api/index', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, chat_id })
            });

            tg.close(); // Cierra la app al terminar
        }
    </script>
</body>
</html>
